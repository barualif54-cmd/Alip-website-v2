<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cyber Attendance System</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<div id="boot">
  <pre id="bootText"></pre>
</div>

<div class="scanline"></div>

<div class="container hidden" id="app">

  <h1 class="glitch" data-text="SYSTEM ACCESS TERMINAL - ATTENDANCE LOG">
    SYSTEM ACCESS TERMINAL - ATTENDANCE LOG
  </h1>

  <div id="loginBox" class="box">
    <h2>> LOGIN MODULE</h2>
    <input type="text" id="username" placeholder="Enter Username" />
    <input type="password" id="password" placeholder="Enter Password" />
    <button onclick="login()">MASUK</button>
    <p class="note">* Simulasi absensi frontend (tanpa server)</p>
  </div>

  <div id="dashboard" class="box hidden">
    <h2>> DASHBOARD</h2>

    <p id="welcome"></p>
    <p id="loginTime"></p>
    <p>Status: <span class="online">HADIR</span></p>

    <button onclick="logout()">ABSEN KELUAR</button>

    <hr>
    <h3>> LOG AKTIVITAS</h3>
    <div id="logTable"></div>
  </div>

</div>

<audio id="beep" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
